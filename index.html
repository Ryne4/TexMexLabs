<!DOCTYPE html>
<html lang="en">
<head>

  <meta property="og:image" content="https://texmexlabs.com/preview.png" />

  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.font = '52px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🌶️', 32, 36);
      const link = document.createElement('link');
      link.rel = 'icon';
      link.href = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fire: #FF4500;
      --ember: #FF8C00;
      --soft-orange: #FFB347;
      --ash: #111111;
      --white: #ffffff;
    }
    html, body { height: 100%; background: var(--ash); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    #heatCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35; }

    #cursorGlow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .wrapper {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .logo-wrap {
      width: min(300px, 68vw);
      margin-bottom: 36px;
      animation: floatIn 1.1s cubic-bezier(0.22,1,0.36,1) both;
    }
    .logo-wrap img {
      width: 100%;
      mix-blend-mode: screen;
      display: block;
    }

    .tagline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem,7vw,5rem);
      letter-spacing: 0.06em;
      line-height: 1.05;
      color: #ffffff;
      animation: floatIn 1.1s 0.15s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 16px;
      will-change: color, filter;
    }

    .sub {
      font-size: clamp(0.95rem,2.5vw,1.2rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      animation: floatIn 1.1s 0.28s cubic-bezier(0.22,1,0.36,1) both;
      margin-bottom: 56px;
      will-change: color, filter;
    }

    .divider { display: flex; align-items: center; gap: 14px; margin-bottom: 52px; animation: floatIn 1.1s 0.38s cubic-bezier(0.22,1,0.36,1) both; }
    .divider span { display: block; width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--fire)); }
    .divider span:last-child { background: linear-gradient(90deg, var(--fire), transparent); }

    .badges { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; animation: floatIn 1.1s 0.48s cubic-bezier(0.22,1,0.36,1) both; }
    .badge { display: flex; align-items: center; gap: 14px; padding: 14px 26px; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; background: rgba(255,255,255,0.04); backdrop-filter: blur(8px); position: relative; overflow: hidden; cursor: default; transition: border-color 0.3s, background 0.3s, transform 0.25s; }
    .badge::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,69,0,0.08),transparent); opacity: 0; transition: opacity 0.3s; }
    .badge:hover { border-color: rgba(255,100,0,0.5); background: rgba(255,255,255,0.07); transform: translateY(-3px); }
    .badge:hover::before { opacity: 1; }
    .badge-icon { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .badge-icon svg { width: 100%; height: 100%; }
    .badge-text { text-align: left; }
    .badge-text .soon { display: block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember); font-weight: 600; margin-bottom: 2px; }
    .badge-text .store { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.08em; color: var(--white); }

    footer {
      position: absolute;
      bottom: 24px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    footer a {
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: rgba(255,140,60,0.7); }

    @keyframes floatIn { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="cursorGlow"></div>
<canvas id="heatCanvas"></canvas>
<div class="wrapper">

  <div class="logo-wrap" id="logoWrap">
    <img id="logoImg" src="logo.png" alt="Tex Mex Labs" />
  </div>

  <h1 class="tagline" id="tagline">Tex Mex Labs</h1>
  <p class="sub" id="sub">Creating fun games &amp; apps for everyone</p>

  <div class="divider"><span></span>🌶️<span></span></div>

  <div class="badges">
    <div class="badge">
      <div class="badge-icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
      </div>
      <div class="badge-text"><span class="soon">Coming Soon</span><span class="store">App Store</span></div>
    </div>
    <div class="badge">
      <div class="badge-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.18 23.76c.3.17.64.24.99.2L14.64 12 11 8.36z" fill="#EA4335"/>
          <path d="M20.47 10.22l-2.93-1.67-3.9 3.45 3.9 3.45 2.96-1.69c.84-.48.84-1.56-.03-2.04z" fill="#FBBC05"/>
          <path d="M3.18.24C2.83.19 2.48.27 2.19.44L14.64 12l3.64-3.64z" fill="#4285F4"/>
          <path d="M2.19 23.56c.29.17.64.25.99.2L17.18 12 4.18.44z" fill="#34A853"/>
        </svg>
      </div>
      <div class="badge-text"><span class="soon">Coming Soon</span><span class="store">Google Play</span></div>
    </div>
  </div>

  <footer>
    <span>&copy; 2026 Tex Mex Labs &nbsp;&middot;&nbsp; Texas, USA</span>
    <span>&middot;</span>
    <a href="privacy.html">Privacy Policy</a>
  </footer>
</div>

<script>
  // ── Cursor ambient glow ───────────────────────────────────────────────
  const glowEl = document.getElementById('cursorGlow');

  // ── Proximity-reactive elements ───────────────────────────────────────
  const logoWrap = document.getElementById('logoWrap');
  const logoImg  = document.getElementById('logoImg');
  const tagline  = document.getElementById('tagline');
  const sub      = document.getElementById('sub');

  const WHITE       = [255, 255, 255];
  const SOFT_ORANGE = [255, 179, 102];
  const MAX_DIST    = 480;

  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpColor(a, b, t) {
    return [
      Math.round(lerp(a[0], b[0], t)),
      Math.round(lerp(a[1], b[1], t)),
      Math.round(lerp(a[2], b[2], t)),
    ];
  }

  function applyProximity(mx, my) {
    [tagline, sub].forEach((el) => {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const dist = Math.hypot(mx - cx, my - cy);
      const t = 1 - Math.min(dist / MAX_DIST, 1);
      const [r, g, b] = lerpColor(WHITE, SOFT_ORANGE, t);
      const glowAmt = t * 18;
      const glowAlp = t * 0.55;
      el.style.color  = `rgb(${r},${g},${b})`;
      el.style.filter = glowAmt > 0.5
        ? `drop-shadow(0 0 ${glowAmt}px rgba(255,160,80,${glowAlp}))`
        : 'none';
    });

    const lRect = logoWrap.getBoundingClientRect();
    const lx = lRect.left + lRect.width  / 2;
    const ly = lRect.top  + lRect.height / 2;
    const lDist = Math.hypot(mx - lx, my - ly);
    const lt = 1 - Math.min(lDist / MAX_DIST, 1);

    const sepia     = lt * 100;
    const saturate  = 100 + lt * 120;
    const hueShift  = lt * 10;
    const glowAmt   = lt * 22;
    const glowAlp   = lt * 0.5;

    const tintFilter = lt > 0.02
      ? `sepia(${sepia}%) saturate(${saturate}%) hue-rotate(${hueShift}deg)`
      : '';
    const glowFilter = glowAmt > 0.5
      ? `drop-shadow(0 0 ${glowAmt}px rgba(255,160,80,${glowAlp}))`
      : '';

    logoImg.style.filter = [tintFilter, glowFilter].filter(Boolean).join(' ') || 'none';
  }

  applyProximity(-9999, -9999);

  document.addEventListener('mousemove', e => {
    glowEl.style.background =
      `radial-gradient(circle 280px at ${e.clientX}px ${e.clientY}px,
        rgba(255,140,60,0.10) 0%, transparent 100%)`;
    applyProximity(e.clientX, e.clientY);
  });

  document.addEventListener('mouseleave', () => {
    glowEl.style.background = 'none';
    applyProximity(-9999, -9999);
  });

  // ── Heat particles ────────────────────────────────────────────────────
  const canvas = document.getElementById('heatCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function randomParticle() {
    return { x: Math.random()*W, y: H+10, r: Math.random()*2.5+0.5,
             speed: Math.random()*0.8+0.3, drift: (Math.random()-0.5)*0.4,
             alpha: Math.random()*0.6+0.2, hue: Math.random()*40+10 };
  }
  function init() {
    resize();
    for (let i = 0; i < 60; i++) { const p = randomParticle(); p.y = Math.random()*H; particles.push(p); }
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},100%,60%,${p.alpha})`;
      ctx.fill();
      p.y -= p.speed; p.x += p.drift; p.alpha -= 0.0015;
      if (p.y < -10 || p.alpha <= 0) particles[i] = randomParticle();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
</script>
</body>
</html>
